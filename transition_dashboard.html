<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宸启跃迁监控看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f6fa; color: #2c3e50; }

/* 顶部 */
.header { background: #fff; border-bottom: 1px solid #e8ecf0; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 20px; font-weight: 700; color: #1a1a2e; }
.header-sub { font-size: 13px; color: #8a94a6; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.update-time { font-size: 12px; color: #aab; background: #f0f2f5; padding: 4px 10px; border-radius: 4px; }

/* 筛选栏 */
.filter-bar { background: #fff; border-bottom: 1px solid #e8ecf0; padding: 10px 32px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.filter-label { font-size: 13px; color: #666; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #dde1e9; background: #fff; font-size: 13px; cursor: pointer; color: #555; transition: all .15s; }
.filter-btn:hover { border-color: #4e7cf6; color: #4e7cf6; }
.filter-btn.active { background: #4e7cf6; color: #fff; border-color: #4e7cf6; }
.filter-search { padding: 5px 12px; border: 1px solid #dde1e9; border-radius: 6px; font-size: 13px; width: 200px; outline: none; }
.filter-search:focus { border-color: #4e7cf6; }
select.filter-select { padding: 5px 10px; border: 1px solid #dde1e9; border-radius: 6px; font-size: 13px; outline: none; }

/* 主内容 */
.main { padding: 20px 32px; }

/* 汇总卡片 */
.summary-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 20px; }
.stat-card { background: #fff; border-radius: 10px; padding: 18px 20px; border: 1px solid #e8ecf0; }
.stat-card .label { font-size: 12px; color: #8a94a6; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .sub { font-size: 12px; color: #aab; margin-top: 4px; }
.stat-card.success .value { color: #27ae60; }
.stat-card.sprint .value { color: #e67e22; }
.stat-card.active .value { color: #4e7cf6; }
.stat-card.idle .value { color: #aab; }
.stat-card.total .value { color: #2c3e50; }

/* 进度条总览 */
.progress-overview { background: #fff; border-radius: 10px; padding: 18px 24px; margin-bottom: 20px; border: 1px solid #e8ecf0; }
.progress-overview h3 { font-size: 14px; color: #555; margin-bottom: 12px; }
.big-progress { height: 24px; border-radius: 12px; overflow: hidden; display: flex; background: #f0f2f5; }
.big-progress .seg { height: 100%; transition: width .4s; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 600; white-space: nowrap; overflow: hidden; }
.seg.success { background: #27ae60; }
.seg.sprint { background: #e67e22; }
.seg.active { background: #4e7cf6; }
.seg.idle { background: #d0d5dd; }
.legend-row { display: flex; gap: 20px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* 图表行 */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.chart-card { background: #fff; border-radius: 10px; padding: 18px 20px; border: 1px solid #e8ecf0; }
.chart-card h3 { font-size: 14px; color: #555; margin-bottom: 12px; }
.chart-box { height: 240px; }

/* 明细表 */
.table-card { background: #fff; border-radius: 10px; border: 1px solid #e8ecf0; overflow: hidden; }
.table-header { padding: 14px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
.table-header h3 { font-size: 14px; color: #555; }
.table-count { font-size: 12px; color: #aab; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #f8f9fb; padding: 10px 14px; text-align: left; color: #666; font-weight: 600; border-bottom: 1px solid #eee; white-space: nowrap; }
tbody tr { border-bottom: 1px solid #f0f2f5; transition: background .1s; }
tbody tr:hover { background: #f8f9fb; }
tbody td { padding: 10px 14px; vertical-align: middle; }
.progress-bar { height: 6px; border-radius: 3px; background: #f0f2f5; min-width: 80px; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge.已跃迁 { background: #e8f8ee; color: #27ae60; }
.badge.冲刺中 { background: #fef3e8; color: #e67e22; }
.badge.有消耗 { background: #eef2ff; color: #4e7cf6; }
.badge.未启动 { background: #f5f6fa; color: #aab; }
.no-data { color: #ccc; font-style: italic; }

/* 分页 */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 16px; }
.page-btn { padding: 5px 12px; border: 1px solid #dde1e9; border-radius: 6px; cursor: pointer; font-size: 13px; background: #fff; }
.page-btn:hover { border-color: #4e7cf6; color: #4e7cf6; }
.page-btn.active { background: #4e7cf6; color: #fff; border-color: #4e7cf6; }
.page-info { font-size: 13px; color: #aab; }
</style>
</head>

let filteredClients = [];
let currentStatus = 'all';
let currentGroup = 'all';
let currentSearch = '';
let currentPage = 1;
const PAGE_SIZE = 50;

function init() {
  const d = RAW_DATA;
  
  // 填汇总卡
  document.getElementById('sTotal').textContent = d.summary.total;
  document.getElementById('sSuccess').textContent = d.summary.success;
  document.getElementById('sSprint').textContent = d.summary.sprint;
  document.getElementById('sActive').textContent = d.summary.active;
  document.getElementById('sIdle').textContent = d.summary.idle;
  document.getElementById('daysInfo').textContent = d.apr_days_passed;
  document.getElementById('updateTime').textContent = `数据更新：${d.update_date}`;

  // 进度条
  const t = d.summary.total;
  const pct = v => (v/t*100).toFixed(1);
  document.getElementById('bigProgress').innerHTML = `
    <div class="seg success" style="width:${pct(d.summary.success)}%">${d.summary.success > 0 ? d.summary.success+'个' : ''}</div>
    <div class="seg sprint" style="width:${pct(d.summary.sprint)}%">${d.summary.sprint > 0 ? d.summary.sprint+'个' : ''}</div>
    <div class="seg active" style="width:${pct(d.summary.active)}%">${d.summary.active > 0 ? d.summary.active+'个' : ''}</div>
    <div class="seg idle" style="width:${pct(d.summary.idle)}%">${d.summary.idle > 0 ? d.summary.idle+'个' : ''}</div>
  `;
  document.getElementById('pctSuccess').textContent = `${d.summary.success}个 (${pct(d.summary.success)}%)`;
  document.getElementById('pctSprint').textContent = `${d.summary.sprint}个 (${pct(d.summary.sprint)}%)`;
  document.getElementById('pctActive').textContent = `${d.summary.active}个 (${pct(d.summary.active)}%)`;
  document.getElementById('pctIdle').textContent = `${d.summary.idle}个 (${pct(d.summary.idle)}%)`;

  // 小组下拉
  const groups = [...new Set(d.clients.map(c => c.group))].sort();
  const sel = document.getElementById('groupFilter');
  groups.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    sel.appendChild(opt);
  });

  // 图表
  renderGroupChart(d);
  renderDistChart(d);

  // 表格
  applyFilter();
}

function renderGroupChart(d) {
  const chart = echarts.init(document.getElementById('chartGroup'));
  const groups = Object.keys(d.group_stats).sort();
  chart.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
    legend: { data: ['已跃迁','冲刺中','有消耗','未启动'], bottom: 0, textStyle: { fontSize: 11 } },
    grid: { left: 8, right: 8, top: 10, bottom: 40, containLabel: true },
    xAxis: { type: 'value', axisLabel: { fontSize: 11 } },
    yAxis: { type: 'category', data: groups, axisLabel: { fontSize: 11, width: 80, overflow: 'truncate' } },
    series: [
      { name: '已跃迁', type: 'bar', stack: 'total', data: groups.map(g => d.group_stats[g].success), itemStyle: { color: '#27ae60' } },
      { name: '冲刺中', type: 'bar', stack: 'total', data: groups.map(g => d.group_stats[g].sprint), itemStyle: { color: '#e67e22' } },
      { name: '有消耗', type: 'bar', stack: 'total', data: groups.map(g => d.group_stats[g].active), itemStyle: { color: '#4e7cf6' } },
      { name: '未启动', type: 'bar', stack: 'total', data: groups.map(g => d.group_stats[g].idle), itemStyle: { color: '#d0d5dd' } },
    ]
  });
}

function renderDistChart(d) {
  const chart = echarts.init(document.getElementById('chartDist'));
  // 4月日均分布区间
  const buckets = ['0', '0-100', '100-200', '200-300', '300-400', '400-500', '500+'];
  const counts = [0,0,0,0,0,0,0];
  d.clients.forEach(c => {
    const v = c.apr_daily;
    if (v === 0) counts[0]++;
    else if (v < 100) counts[1]++;
    else if (v < 200) counts[2]++;
    else if (v < 300) counts[3]++;
    else if (v < 400) counts[4]++;
    else if (v < 500) counts[5]++;
    else counts[6]++;
  });
  const colors = ['#d0d5dd','#b0bec5','#90a4ae','#78909c','#e67e22','#f39c12','#27ae60'];
  chart.setOption({
    tooltip: { trigger: 'axis' },
    grid: { left: 8, right: 16, top: 10, bottom: 30, containLabel: true },
    xAxis: { type: 'category', data: buckets, axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', axisLabel: { fontSize: 11 } },
    series: [{
      type: 'bar', data: counts.map((v,i) => ({ value: v, itemStyle: { color: colors[i] } })),
      label: { show: true, position: 'top', fontSize: 11 }
    }]
  });
}

function applyFilter() {
  currentPage = 1;
  const d = RAW_DATA;
  filteredClients = d.clients.filter(c => {
    if (currentStatus !== 'all' && c.status !== currentStatus) return false;
    if (currentGroup !== 'all' && c.group !== currentGroup) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      if (!c.name.toLowerCase().includes(q) && !c.op.toLowerCase().includes(q) && !c.group.toLowerCase().includes(q)) return false;
    }
    return true;
  });
  renderTable();
}

function renderTable() {
  const total = filteredClients.length;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredClients.slice(start, start + PAGE_SIZE);
  document.getElementById('tableCount').textContent = `共 ${total} 条`;

  const colors = { '已跃迁': '#27ae60', '冲刺中': '#e67e22', '有消耗': '#4e7cf6', '未启动': '#d0d5dd' };
  const icons = { '已跃迁': '✅', '冲刺中': '🔥', '有消耗': '📈', '未启动': '⚪' };

  document.getElementById('tableBody').innerHTML = pageData.map((c, i) => `
    <tr>
      <td style="color:#aab;font-size:12px">${start + i + 1}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.name}">${c.name}</td>
      <td style="white-space:nowrap">${c.group}</td>
      <td style="white-space:nowrap">${c.op}</td>
      <td style="text-align:right">${c.mar_daily > 0 ? c.mar_daily.toLocaleString() : '<span class="no-data">-</span>'}</td>
      <td style="text-align:right">${c.apr_total > 0 ? c.apr_total.toLocaleString() : '<span class="no-data">-</span>'}</td>
      <td style="text-align:right;font-weight:${c.apr_daily >= 500 ? '700' : '400'};color:${c.apr_daily >= 500 ? '#27ae60' : 'inherit'}">${c.apr_daily > 0 ? c.apr_daily.toLocaleString() : '<span class="no-data">-</span>'}</td>
      <td style="text-align:right;color:${c.gap === 0 ? '#27ae60' : '#e67e22'}">${c.gap === 0 ? '✅ 达标' : c.gap.toLocaleString()}</td>
      <td style="min-width:90px">
        <div class="progress-bar">
          <div class="progress-fill" style="width:${c.progress}%;background:${colors[c.status]}"></div>
        </div>
        <div style="font-size:11px;color:#aab;margin-top:2px">${c.progress}%</div>
      </td>
      <td><span class="badge ${c.status}">${icons[c.status]} ${c.status}</span></td>
    </tr>
  `).join('');

  // 分页
  const totalPages = Math.ceil(total / PAGE_SIZE);
  let pgHtml = '';
  if (totalPages > 1) {
    pgHtml += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ 上一页</button>`;
    for (let p = Math.max(1, currentPage-2); p <= Math.min(totalPages, currentPage+2); p++) {
      pgHtml += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }
    pgHtml += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>下一页 ›</button>`;
    pgHtml += `<span class="page-info">第 ${currentPage}/${totalPages} 页</span>`;
  }
  document.getElementById('pagination').innerHTML = pgHtml;
}

function filterStatus(s) {
  currentStatus = s;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilter();
}
function filterGroup() {
  currentGroup = document.getElementById('groupFilter').value;
  applyFilter();
}
function doSearch() {
  currentSearch = document.getElementById('searchInput').value.trim();
  applyFilter();
}
function goPage(p) {
  const totalPages = Math.ceil(filteredClients.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
  window.scrollTo(0, document.querySelector('.table-card').offsetTop - 20);
}

function downloadExcel() {
  const statusMap = { '已跃迁': '✅ 已跃迁', '冲刺中': '🔥 冲刺中', '有消耗': '📈 有消耗', '未启动': '⚪ 未启动' };
  const headers = ['子账户名称', '所属小组', '运营人员', '3月总消耗(元)', '3月日均(元)', '4月累计消耗(元)', '4月日均(元)', '距目标缺口(元)', '进度(%)', '跃迁状态'];
  
  // 构建 CSV 内容（Excel 可直接打开）
  const rows = [headers];
  filteredClients.forEach(c => {
    rows.push([
      c.name,
      c.group,
      c.op,
      c.mar_total,
      c.mar_daily,
      c.apr_total,
      c.apr_daily,
      c.gap,
      c.progress,
      c.status
    ]);
  });

  // 用 BOM 保证 Excel 正确识别 UTF-8 中文
  const bom = '\uFEFF';
  const csvContent = bom + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = RAW_DATA.update_date;
  a.href = url;
  a.download = `宸启跃迁客户明细_${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

init();
</script>
